<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Crush — Level Editor</title>
  <link rel="stylesheet" href="/src/editor/editor.css">
</head>
<body>
  <div id="editor-container">
    <header class="editor-header">
      <h1>Fruit Crush Level Editor</h1>
      <div class="editor-actions">
        <button id="btn-export" class="editor-btn">Export JSON</button>
        <button id="btn-import" class="editor-btn">Import JSON</button>
        <button id="btn-clear" class="editor-btn btn-danger">Clear Grid</button>
        <input type="file" id="file-import" accept=".json" hidden>
      </div>
    </header>

    <div class="editor-layout">
      <div class="editor-sidebar">
        <div class="config-section">
          <h3>Level Config</h3>
          <label>Level ID <input type="number" id="cfg-id" value="1" min="1"></label>
          <label>Name <input type="text" id="cfg-name" value="New Level"></label>
          <label>Mode
            <select id="cfg-mode">
              <option value="score">Score Target</option>
              <option value="jellies">Clear Jellies</option>
              <option value="ingredients">Ingredients</option>
              <option value="timed">Timed</option>
            </select>
          </label>
          <label>Fruit Count <input type="number" id="cfg-fruits" value="5" min="3" max="10"></label>
          <label>Moves <input type="number" id="cfg-moves" value="20" min="1"></label>
          <label>Time Limit (s) <input type="number" id="cfg-time" value="60" min="1" disabled></label>
          <label>Target Score <input type="number" id="cfg-target" value="1000" min="1"></label>
        </div>

        <div class="config-section">
          <h3>Star Thresholds</h3>
          <label>1 Star <input type="number" id="cfg-star1" value="1000" min="1"></label>
          <label>2 Stars <input type="number" id="cfg-star2" value="2000" min="1"></label>
          <label>3 Stars <input type="number" id="cfg-star3" value="3000" min="1"></label>
        </div>

        <div class="config-section">
          <h3>Ingredients (if mode)</h3>
          <label>Spawn Cols (comma) <input type="text" id="cfg-spawn-cols" value="3,8"></label>
          <label>Total Needed <input type="number" id="cfg-total-needed" value="4" min="1"></label>
        </div>

        <div class="config-section">
          <h3>Paint Tool</h3>
          <div class="tool-buttons">
            <button class="tool-btn active" data-tool="active">Active Cell</button>
            <button class="tool-btn" data-tool="hole">Hole</button>
            <button class="tool-btn" data-tool="jelly">Jelly</button>
            <button class="tool-btn" data-tool="frosting_1">Frosting (1-hit)</button>
            <button class="tool-btn" data-tool="frosting_2">Frosting (2-hit)</button>
            <button class="tool-btn" data-tool="chocolate">Chocolate</button>
            <button class="tool-btn" data-tool="licorice_lock">Licorice Lock</button>
            <button class="tool-btn" data-tool="marmalade">Marmalade</button>
          </div>
        </div>
      </div>

      <div class="editor-grid-area">
        <div id="editor-grid" class="editor-grid"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/editor/main.js"></script>
</body>
</html>
